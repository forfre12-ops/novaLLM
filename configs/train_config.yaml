# nova-llm QLoRA SFT 설정 — RTX 5070 Ti 16GB(Blackwell) 기준

# 베이스 모델 (한국어 강한 오픈모델)
#   Qwen/Qwen2.5-7B-Instruct              ← 기본. Apache-2.0(상업가능), 한국어 우수
#   LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct  ← 한국어 최강급, 단 라이선스 비상업(연구용)
#   google/gemma-2-9b-it                  ← Gemma 라이선스, 9B는 16GB QLoRA 빠듯(seq 짧게)
base_model: "Qwen/Qwen2.5-7B-Instruct"
chat_template: "chatml"      # Qwen=chatml, gemma=gemma, llama=llama-3

# 데이터 — {"messages":[{"role","content"},...]} 형식 jsonl
train_file: "data/processed/train.jsonl"
max_seq_length: 2048

# QLoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
load_in_4bit: true
# LoRA 부착 대상. 기본은 attention 4-module(T0 벤치에서 7B가 seq1024·batch2로 13.72GB=16GB FIT 검증).
# 품질을 더 원하면 MLP까지 확장: [q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj] (VRAM↑).
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

# 학습 하이퍼파라미터 (16GB 안전값)
batch_size: 2                # OOM 나면 1로 낮추기
grad_accum: 8                # 유효 배치 = batch_size * grad_accum = 16
epochs: 2
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.03
seed: 3407
gradient_checkpointing: true  # seq 2048엔 필수(활성 메모리 절감). 짧은 데이터면 꺼도 무방(속도↑)

# 로깅/체크포인트 (수동 루프 — optimizer step 기준)
logging_steps: 10
save_steps: 50               # N optimizer step마다 LoRA 어댑터 중간 저장(USB 분리 대비). 0=끄기
save_total_limit: 3          # 최근 체크포인트 N개만 보존

# 출력
output_dir: "checkpoints/sft-run1"
report_to: "none"            # (현재 수동 루프는 미사용, 예약 필드)
