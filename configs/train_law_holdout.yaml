# Multi-law grounded SFT holdout smoke config.
# Generate data first:
#   python scripts/data/gen_law_sft.py --corpus data/processed/laws.json --out data/processed/law_sft_holdout.jsonl --exclude-questions eval/laws_runner.smoke.json

base_model: "Qwen/Qwen2.5-1.5B-Instruct"
chat_template: "chatml"

train_file: "data/processed/law_sft_holdout.jsonl"
max_seq_length: 1536

lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
load_in_4bit: true
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

batch_size: 1
grad_accum: 8
epochs: 2
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.03
seed: 3407
gradient_checkpointing: true

logging_steps: 10
save_steps: 0
save_total_limit: 3

output_dir: "checkpoints/g0-law-holdout"
report_to: "none"
