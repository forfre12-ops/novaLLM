name: Parser bug
description: Report a law corpus parser issue
title: "[parser] "
labels: ["parser", "bug"]
body:
  - type: textarea
    id: raw_shape
    attributes:
      label: Raw response shape
      description: Redact API keys. Include the smallest JSON/XML snippet that reproduces the issue.
      render: text
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      render: powershell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected normalized entries
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
