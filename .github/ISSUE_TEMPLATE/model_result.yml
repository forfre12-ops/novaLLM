name: Model result
description: Submit a reproducible citation fingerprint result
title: "[result] "
labels: ["result"]
body:
  - type: input
    id: model
    attributes:
      label: Model
      description: Model name and exact version/revision.
      placeholder: Qwen/Qwen2.5-7B-Instruct
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: nova-llm commit
      description: Git commit used for the run.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Exact command used.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Artifacts
      description: Result JSON/transcript links or attached snippets.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any deviations, hardware details, or known caveats.
